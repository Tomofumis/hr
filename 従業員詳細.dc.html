<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/fonts.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/colors.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/typography.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/spacing.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/base.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/components.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/styles.css">
<script src="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="app-theme.css">
</helmet>

<div data-theme="{{ themeAttr }}" style="min-height:100vh;background:var(--bg-page);color:var(--text-1);font-family:var(--font-sans);font-size:var(--text-base);line-height:1.5">
<div style="display:flex;min-height:100vh;background:var(--bg-page)">

  <aside class="app-side" style="width:236px;flex:0 0 236px;border-right:1px solid var(--border-hairline);background:var(--surface);display:flex;flex-direction:column;position:sticky;top:0;height:100vh">
    <div style="display:flex;align-items:center;gap:10px;padding:20px 20px 18px">
      <span style="width:30px;height:30px;border-radius:8px;background:var(--accent);display:grid;place-items:center"><i data-lucide="square-stack" width="17" height="17" style="color:var(--accent-on)"></i></span>
      <span style="font-size:17px;font-weight:500;letter-spacing:-0.01em">給与デスク</span>
    </div>
    <nav style="display:flex;flex-direction:column;gap:2px;padding:6px 12px;flex:1;overflow:auto">
      <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="9">
        <a href="{{ item.href }}" class="nav-link" style="{{ item.style }}">
          <i data-lucide="{{ item.icon }}" width="18" height="18" style="flex:0 0 auto"></i>
          <span>{{ item.label }}</span>
        </a>
      </sc-for>
    </nav>
    <div style="padding:14px 16px;border-top:1px solid var(--border-hairline);display:flex;align-items:center;gap:10px">
      <span style="width:30px;height:30px;border-radius:50%;background:var(--surface-sunken);border:1px solid var(--border);display:grid;place-items:center;font-size:12px;color:var(--text-2)">経</span>
      <div style="display:flex;flex-direction:column;line-height:1.3"><span style="font-size:13px">経理 担当</span><span style="font-size:11px;color:var(--text-3)">管理者</span></div>
    </div>
  </aside>

  <div style="flex:1;min-width:0;display:flex;flex-direction:column">

    <header style="position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 28px;border-bottom:1px solid var(--border-hairline);background:color-mix(in srgb,var(--surface) 86%,transparent);backdrop-filter:blur(8px)">
      <div style="display:flex;align-items:center;gap:14px;min-width:0">
        <span style="font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ companyName }}</span>
        <button onClick="{{ cycleMonth }}" style="display:inline-flex;align-items:center;gap:7px;padding:7px 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text-1);font-family:inherit;font-size:13px;cursor:pointer;white-space:nowrap;flex:0 0 auto">
          <i data-lucide="calendar" width="15" height="15" style="color:var(--text-3)"></i>
          <span style="font-variant-numeric:tabular-nums">{{ monthLabel }}</span>
          <i data-lucide="chevron-down" width="14" height="14" style="color:var(--text-3)"></i>
        </button>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <button aria-label="通知" style="position:relative;width:38px;height:38px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--text-2);display:grid;place-items:center;cursor:pointer">
          <i data-lucide="bell" width="19" height="19"></i>
          <span style="position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--accent);border:1.5px solid var(--surface)"></span>
        </button>
        <button onClick="{{ toggleTheme }}" aria-label="表示テーマ" style="width:38px;height:38px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--text-2);display:grid;place-items:center;cursor:pointer">
          <i data-lucide="{{ themeIcon }}" width="19" height="19"></i>
        </button>
      </div>
    </header>

    <main style="flex:1;padding:22px 28px 56px;max-width:1240px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:18px">

      <a href="従業員.dc.html" class="ghost-link" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-3);font-size:13px;text-decoration:none;width:fit-content"><i data-lucide="arrow-left" width="15" height="15"></i>従業員一覧へ戻る</a>

      <section style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 24px;display:flex;flex-direction:column;gap:18px">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:16px;min-width:0">
            <span style="width:58px;height:58px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-size:22px;font-weight:500;flex:0 0 auto">山</span>
            <div style="display:flex;flex-direction:column;gap:5px;min-width:0">
              <span style="font-size:12px;color:var(--text-3)">ヤマダ タロウ</span>
              <h1 style="margin:0;font-size:23px;font-weight:500;letter-spacing:-0.01em">山田 太郎</h1>
              <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:2px">
                <span style="display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:500;background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent-soft-border)">正社員</span>
                <span style="display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:500;background:var(--ok-bg);color:var(--ok-fg);border:1px solid var(--ok-border)"><i data-lucide="check" width="12" height="12"></i>在籍</span>
                <span style="display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;font-size:12px;background:var(--surface-sunken);color:var(--text-2);border:1px solid var(--border);font-family:var(--font-mono);white-space:nowrap">A-001</span>
                <span style="display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;font-size:12px;background:var(--surface-sunken);color:var(--text-2);border:1px solid var(--border)">営業部</span>
              </div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <x-import component-from-global-scope="ToriokiDesignSystem_4ced92.Button" variant="secondary" size="sm" onClick="{{ noop }}" hint-size="auto,34px">給与プレビュー</x-import>
            <x-import component-from-global-scope="ToriokiDesignSystem_4ced92.Button" variant="primary" size="sm" onClick="{{ noop }}" hint-size="auto,34px">情報を編集</x-import>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;border-top:1px solid var(--border-hairline);padding-top:16px">
          <div style="display:flex;flex-direction:column;gap:2px"><span style="font-size:12px;color:var(--text-3)">入社日</span><span style="font-size:14px;font-weight:500;font-variant-numeric:tabular-nums">2018/04/01</span></div>
          <div style="display:flex;flex-direction:column;gap:2px"><span style="font-size:12px;color:var(--text-3)">勤続年数</span><span style="font-size:14px;font-weight:500">8年2ヶ月</span></div>
          <div style="display:flex;flex-direction:column;gap:2px"><span style="font-size:12px;color:var(--text-3)">締め日・支払日</span><span style="font-size:14px;font-weight:500">15日締め / 当月25日払い</span></div>
          <div style="display:flex;flex-direction:column;gap:2px"><span style="font-size:12px;color:var(--text-3)">ログインメール</span><span style="font-size:14px;font-weight:500;font-family:var(--font-mono);overflow:hidden;text-overflow:ellipsis">t.yamada@example.co.jp</span></div>
        </div>
      </section>

      <div style="column-width:430px;column-gap:18px">
        <sc-for list="{{ sections }}" as="sec" hint-placeholder-count="8">
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;break-inside:avoid;margin:0 0 18px;display:flex;flex-direction:column;gap:6px">
            <div style="display:flex;align-items:center;gap:10px;padding-bottom:8px">
              <span style="width:32px;height:32px;border-radius:9px;background:var(--accent-soft);display:grid;place-items:center;flex:0 0 auto"><i data-lucide="{{ sec.icon }}" width="16" height="16" style="color:var(--accent)"></i></span>
              <h2 style="margin:0;font-size:15px;font-weight:500">{{ sec.title }}</h2>
            </div>
            <sc-for list="{{ sec.fields }}" as="f" hint-placeholder-count="6">
              <div style="display:grid;grid-template-columns:132px 1fr;gap:12px;align-items:baseline;padding:9px 0;border-top:1px solid var(--border-hairline)">
                <span style="font-size:13px;color:var(--text-3)">{{ f.label }}</span>
                <span style="{{ f.valueStyle }}">{{ f.value }}<sc-if value="{{ f.unset }}" hint-placeholder-val="{{ false }}"><a href="#" class="ghost-link" style="font-size:12px;color:var(--accent);text-decoration:none;white-space:nowrap;margin-left:10px">設定する</a></sc-if></span>
              </div>
            </sc-for>
          </div>
        </sc-for>
      </div>

    </main>
  </div>
</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 920 },
  &quot;companyName&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;吉田国際特許事務所&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;事業所&quot; }
}">
class Component extends DCLogic {
  state = { themeAttr: '', monthIndex: 1 };
  months = ['2026年5月度', '2026年6月度', '2026年7月度'];

  nav = [
    ['ダッシュボード', 'layout-dashboard', '給与ダッシュボード.dc.html', false],
    ['従業員', 'users', '従業員.dc.html', true],
    ['勤怠', 'clock', '勤怠.dc.html', false],
    ['休暇・有給', 'palmtree', '休暇・有給.dc.html', false],
    ['給与計算', 'calculator', '給与計算.dc.html', false],
    ['明細チェック', 'clipboard-check', '明細チェック.dc.html', false],
    ['賞与', 'gift', '賞与.dc.html', false],
    ['年末調整', 'file-text', '年末調整.dc.html', false],
    ['書類', 'folder', '書類.dc.html', false],
    ['設定', 'settings', '設定.dc.html', false],
  ];

  secs = [
    { title: '基本情報', icon: 'user-round', fields: [
      ['氏名', '山田 太郎'], ['フリガナ', 'ヤマダ タロウ'], ['表示名', '山田 太郎'],
      ['従業員番号', 'A-001'], ['入社日', '2018/04/01'], ['勤続年数', '8年2ヶ月'],
      ['生年月日', '1988/06/12'], ['年齢', '38歳'], ['性別', '男性'], ['配偶者', '有'],
      ['雇用形態', '正社員'], ['締め日・支払日', '15日締め / 当月25日払い'], ['ログインメール', 't.yamada@example.co.jp'],
    ] },
    { title: '住所・連絡先', icon: 'map-pin', fields: [
      ['住民票住所', '東京都品川区西五反田 1-2-3'], ['現住所', '住民票住所と同じ'], ['郵便番号', '141-0031'],
      ['世帯主', '本人'], ['世帯主氏名', '山田 太郎'], ['電話番号', '090-1234-5678'],
      ['メールアドレス', 't.yamada@example.co.jp'], ['外国籍', '該当なし'],
    ] },
    { title: '家族情報', icon: 'users', fields: [
      ['家族情報1', '配偶者 ・ 山田 花子（扶養）'], ['家族情報2', '第一子 ・ 山田 一花（扶養）'], ['家族情報3', '第二子 ・ 山田 結（扶養）'],
    ] },
    { title: '給与・賃金情報', icon: 'wallet', fields: [
      ['給与形態', '月給制'], ['基本給', '¥280,000'], ['勤務・賃金設定', '標準（営業部）'],
      ['所定勤務時間', '9:00〜18:00'], ['1日の所定労働時間', '8時間'], ['週の所定労働日数', '5日'],
      ['1ヶ月平均所定労働日数', '21日'], ['1時間あたり賃金（割増）', '¥1,667'], ['1時間あたり賃金（控除）', '¥1,667'],
      ['固定残業代', '¥38,000（25時間分）'], ['通勤手当', '¥13,000 / 月'], ['手当', '役職手当 ¥20,000'], ['控除', '親睦会費 ¥500'],
    ] },
    { title: '税情報', icon: 'receipt', fields: [
      ['所得税計算', '月額表'], ['所得税区分', '甲欄'], ['扶養親族等の数', '3人'],
      ['住民税納付先', '東京都品川区'], ['市区町村コード', '13109'], ['住民税年税額', '¥156,000'],
      ['6月分', '¥13,000'], ['7月〜翌年5月分', '各 ¥13,000'],
    ] },
    { title: '社会保険・労働保険', icon: 'shield', fields: [
      ['健康保険', '協会けんぽ（東京）'], ['健康保険資格取得日', '2018/04/01'], ['健康保険標準報酬月額', '¥300,000'],
      ['厚生年金保険', '加入'], ['厚生年金資格取得日', '2018/04/01'], ['厚生年金標準報酬月額', '¥300,000'],
      ['雇用保険', '加入'], ['雇用保険資格取得日', '2018/04/01'], ['労働保険設定', '一般の事業'], ['事業所名称', '吉田国際特許事務所 本社'],
    ] },
    { title: '振込先・配賦', icon: 'landmark', fields: [
      ['振込先銀行', 'みずほ銀行 五反田支店'], ['口座番号', '普通 1234567'], ['給与振込方法', '全額振込'],
      ['賞与振込方法', '全額振込'], ['給与配賦', '営業部 100%'], ['所属部門', '営業部'],
    ] },
    { title: '未設定・未登録項目', icon: 'circle-dashed', unset: true, fields: [
      ['雇用契約', '未登録'], ['緊急連絡先', '未登録'], ['産前産後・育児休業', '該当なし'], ['所属', '未設定'],
      ['職種', '未設定'], ['等級', '未設定'], ['評価制度', '未設定'], ['カスタム項目', '未設定'],
    ] },
  ];

  componentDidMount() { this._icons(); }
  componentDidUpdate() { this._icons(); }
  _icons() { if (!window.lucide || !window.lucide.createIcons) { setTimeout(() => this._icons(), 140); return; } try { window.lucide.createIcons(); } catch (e) {} }

  toggleTheme = () => this.setState(s => ({ themeAttr: s.themeAttr === 'dark' ? 'light' : 'dark' }));
  cycleMonth = () => this.setState(s => ({ monthIndex: (s.monthIndex + 1) % this.months.length }));

  renderVals() {
    const p = this.props || {};
    const navItems = this.nav.map(([label, icon, href, active]) => ({
      label, icon, href,
      style: `display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;text-decoration:none;font-size:14px;cursor:pointer;${active ? 'background:var(--accent-soft);color:var(--accent);font-weight:500' : 'color:var(--text-2);font-weight:400'}`,
    }));

    const sections = this.secs.map(sec => ({
      title: sec.title, icon: sec.icon,
      fields: sec.fields.map(([label, value]) => {
        const isUnset = !!sec.unset && (value === '未設定' || value === '未登録');
        return {
          label, value,
          unset: isUnset,
          valueStyle: isUnset
            ? 'font-size:14px;color:var(--text-4);min-width:0'
            : 'font-size:14px;color:var(--text-1);font-weight:400;min-width:0',
        };
      }),
    }));

    return {
      themeAttr: this.state.themeAttr,
      themeIcon: this.state.themeAttr === 'dark' ? 'sun' : 'moon',
      toggleTheme: this.toggleTheme,
      companyName: p.companyName ?? '吉田国際特許事務所',
      monthLabel: this.months[this.state.monthIndex],
      cycleMonth: this.cycleMonth,
      navItems,
      noop: () => {},
      sections,
    };
  }
}
</script>
</body>
</html>
