<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/fonts.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/colors.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/typography.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/spacing.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/base.css">
<link rel="stylesheet" href="app-theme.css">
</helmet>

<div data-theme="{{ themeAttr }}" style="min-height:100vh;background:var(--bg-page);color:var(--text-1);font-family:var(--font-sans);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:40px 20px">

  <div style="display:flex;align-items:center;gap:11px">
    <span style="width:36px;height:36px;border-radius:10px;background:var(--accent);display:grid;place-items:center;color:var(--accent-on)">{{ markEl }}</span>
    <span style="font-size:19px;font-weight:500;letter-spacing:-0.01em">給与デスク</span>
  </div>

  <div style="width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:30px 28px;display:flex;flex-direction:column;gap:18px">

    <div style="display:flex;align-items:center;gap:13px;padding:12px 14px;background:var(--accent-soft);border:1px solid var(--accent-soft-border);border-radius:12px">
      <span style="width:40px;height:40px;border-radius:9px;background:var(--surface);border:1px solid var(--accent-soft-border);display:grid;place-items:center;font-size:15px;font-weight:500;color:var(--accent);flex:0 0 auto">山</span>
      <div style="display:flex;flex-direction:column;gap:1px;min-width:0">
        <span style="font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">株式会社 山田製作所</span>
        <span style="font-size:12px;color:var(--text-3);font-family:var(--font-mono)">事業所コード: yamada-mfg</span>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:5px">
      <span style="font-size:18px;font-weight:500">ログイン</span>
      <span style="font-size:13px;color:var(--text-3)">この事業所のアカウントでログインします</span>
    </div>

    <label style="display:flex;flex-direction:column;gap:6px">
      <span style="font-size:13px;color:var(--text-2);font-weight:500">メールアドレス</span>
      <input type="email" placeholder="you@example.co.jp" style="{{ inputStyle }}">
    </label>

    <label style="display:flex;flex-direction:column;gap:6px">
      <span style="font-size:13px;color:var(--text-2);font-weight:500">パスワード</span>
      <div style="position:relative;display:flex;align-items:center">
        <input type="{{ pwType }}" placeholder="••••••••" style="{{ inputStyle }}">
        <button onClick="{{ togglePw }}" aria-label="表示切替" style="position:absolute;right:8px;width:32px;height:32px;border-radius:8px;border:none;background:transparent;color:var(--text-3);display:grid;place-items:center;cursor:pointer">{{ eyeEl }}</button>
      </div>
    </label>

    <a href="給与ダッシュボード.dc.html" style="display:flex;align-items:center;justify-content:center;padding:13px;border-radius:11px;background:var(--accent);color:var(--accent-on);font-size:15px;font-weight:500;text-decoration:none;margin-top:2px">ログイン</a>

    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
      <a href="#" class="ghost-link" style="font-size:13px;color:var(--accent);text-decoration:none">パスワードをお忘れの方</a>
      <a href="#" class="ghost-link" style="font-size:13px;color:var(--text-3);text-decoration:none">別の事業所でログイン</a>
    </div>

  </div>

  <span style="font-size:12px;color:var(--text-4)">© 2026 給与デスク ・ プライバシーポリシー ・ 利用規約</span>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 480, &quot;height&quot;: 720 } }">
class Component extends DCLogic {
  state = { themeAttr: '', showPw: false };
  togglePw = () => this.setState(s => ({ showPw: !s.showPw }));
  _icon(defs, sz, sw) { return React.createElement('svg', { width: sz, height: sz, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: sw || 2, strokeLinecap: 'round', strokeLinejoin: 'round' }, defs.map((d, i) => React.createElement(d[0], { key: i, ...d[1] }))); }
  renderVals() {
    return {
      themeAttr: this.state.themeAttr,
      togglePw: this.togglePw,
      pwType: this.state.showPw ? 'text' : 'password',
      inputStyle: 'width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:11px;background:var(--surface);color:var(--text-1);font-family:inherit;font-size:15px;outline:none',
      markEl: this._icon([['rect', { width: 18, height: 18, x: 3, y: 3, rx: 4 }], ['path', { d: 'M8 12h8' }], ['path', { d: 'M12 8v8' }]], 20, 2),
      eyeEl: this.state.showPw
        ? this._icon([['path', { d: 'M9.9 4.2A9 9 0 0 1 12 4c7 0 10 8 10 8a13 13 0 0 1-1.7 2.7' }], ['path', { d: 'M6.6 6.6A13 13 0 0 0 2 12s3 8 10 8a9 9 0 0 0 5.4-1.6' }], ['path', { d: 'm2 2 20 20' }]], 18, 2)
        : this._icon([['path', { d: 'M2 12s3-8 10-8 10 8 10 8-3 8-10 8-10-8-10-8Z' }], ['circle', { cx: 12, cy: 12, r: 3 }]], 18, 2),
    };
  }
}
</script>
</body>
</html>
