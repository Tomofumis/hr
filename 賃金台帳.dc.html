<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/fonts.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/colors.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/typography.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/spacing.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/base.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/components.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/styles.css">
<script src="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="./hr-data.js"></script>
<script src="./payroll-calc.js"></script>
<link rel="stylesheet" href="app-theme.css">
<style>
@media print { .nop { display: none !important; } @page { size: A4 landscape; margin: 10mm; } body { background: #fff; } }
.lt { border-collapse: collapse; width: 100%; }
.lt th, .lt td { border: 1px solid var(--border-strong); padding: 5px 8px; font-size: 12px; font-variant-numeric: tabular-nums; }
.lt th { background: var(--surface-sunken); color: var(--text-3); font-weight: 500; text-align: right; }
.lt td { text-align: right; font-family: var(--font-mono); color: var(--text-2); }
.lt td.it { text-align: left; font-family: var(--font-sans); color: var(--text-1); background: var(--surface-sunken); }
.lt tr.tot td { font-weight: 500; color: var(--text-1); }
</style>
</helmet>

<div data-theme="{{ themeAttr }}" style="min-height:100vh;background:var(--bg-page);color:var(--text-1);font-family:var(--font-sans);font-size:var(--text-base);line-height:1.5">
<div style="display:flex;min-height:100vh;background:var(--bg-page)">

  <aside class="app-side nop" style="width:236px;flex:0 0 236px;border-right:1px solid var(--border-hairline);background:var(--surface);display:flex;flex-direction:column;position:sticky;top:0;height:100vh">
    <div style="display:flex;align-items:center;gap:10px;padding:20px 20px 18px">
      <span style="width:30px;height:30px;border-radius:8px;background:var(--accent);display:grid;place-items:center"><i data-lucide="square-stack" width="17" height="17" style="color:var(--accent-on)"></i></span>
      <span style="font-size:17px;font-weight:500;letter-spacing:-0.01em">給与デスク</span>
    </div>
    <nav style="display:flex;flex-direction:column;gap:2px;padding:6px 12px;flex:1;overflow:auto">
      <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="10">
        <a href="{{ item.href }}" class="nav-link" style="{{ item.style }}"><i data-lucide="{{ item.icon }}" width="18" height="18" style="flex:0 0 auto"></i><span>{{ item.label }}</span></a>
      </sc-for>
    </nav>
    <div style="padding:14px 16px;border-top:1px solid var(--border-hairline);display:flex;align-items:center;gap:10px">
      <span style="width:30px;height:30px;border-radius:50%;background:var(--surface-sunken);border:1px solid var(--border);display:grid;place-items:center;font-size:12px;color:var(--text-2)">経</span>
      <div style="display:flex;flex-direction:column;line-height:1.3"><span style="font-size:13px">経理 担当</span><span style="font-size:11px;color:var(--text-3)">管理者</span></div>
    </div>
  </aside>

  <div style="flex:1;min-width:0;display:flex;flex-direction:column">
    <header class="nop" style="position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 28px;border-bottom:1px solid var(--border-hairline);background:color-mix(in srgb,var(--surface) 86%,transparent);backdrop-filter:blur(8px)">
      <div style="display:flex;align-items:center;gap:14px;min-width:0">
        <a href="書類.dc.html" class="ghost-link" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-3);font-size:13px;text-decoration:none"><i data-lucide="arrow-left" width="15" height="15"></i>書類へ戻る</a>
        <span style="font-size:15px;font-weight:500">賃金台帳</span>
      </div>
      <button onClick="{{ toggleTheme }}" aria-label="表示テーマ" style="width:38px;height:38px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--text-2);display:grid;place-items:center;cursor:pointer"><i data-lucide="{{ themeIcon }}" width="19" height="19"></i></button>
    </header>

    <main style="flex:1;padding:24px 28px 56px;max-width:1280px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:18px">
      <div class="nop" style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap">
        <div style="display:flex;flex-direction:column;gap:3px">
          <h1 style="margin:0;font-size:24px;font-weight:500">賃金台帳</h1>
          <p style="margin:0;font-size:14px;color:var(--text-3)">従業員ごとの月次の支給・控除を記録します（2026年1月〜6月）。</p>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <select value="{{ selIndex }}" onChange="{{ onSelect }}" style="padding:9px 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text-1);font-family:inherit;font-size:13px;cursor:pointer">
            <sc-for list="{{ empOptions }}" as="o" hint-placeholder-count="7"><option value="{{ o.value }}">{{ o.label }}</option></sc-for>
          </select>
          <button onClick="{{ onDownload }}" style="display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:10px;border:1px solid var(--accent);background:var(--accent);color:var(--accent-on);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer"><i data-lucide="download" width="15" height="15"></i>PDFダウンロード</button>
        </div>
      </div>

      <div style="font-size:14px;font-weight:500">{{ company }} ・ 賃金台帳 ・ {{ selName }}（{{ selCode }}）</div>

      <div style="overflow-x:auto">
        <table class="lt" style="min-width:920px">
          <thead>
            <tr>
              <th class="it" style="text-align:left;color:var(--text-3)">項目 ＼ 月</th>
              <sc-for list="{{ months }}" as="m" hint-placeholder-count="6"><th>{{ m }}</th></sc-for>
              <th style="color:var(--text-1)">計</th>
            </tr>
          </thead>
          <tbody>
            <sc-for list="{{ rows }}" as="r" hint-placeholder-count="13">
              <tr style="{{ r.trStyle }}">
                <td class="it">{{ r.label }}</td>
                <sc-for list="{{ r.cells }}" as="c" hint-placeholder-count="6"><td>{{ c }}</td></sc-for>
                <td style="color:var(--text-1);font-weight:500">{{ r.total }}</td>
              </tr>
            </sc-for>
          </tbody>
        </table>
      </div>
      <div style="font-size:12px;color:var(--text-3)">※ デモのため各月は当月の計算値を表示しています。実運用では各月の確定値を記録します。</div>
    </main>
  </div>
</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 860 }
}">
class Component extends DCLogic {
  state = { themeAttr: '', selIndex: 0 };
  nav = [
    ['ダッシュボード', 'layout-dashboard', '給与ダッシュボード.dc.html', false],
    ['従業員', 'users', '従業員.dc.html', false],
    ['勤怠', 'clock', '勤怠.dc.html', false],
    ['休暇・有給', 'palmtree', '休暇・有給.dc.html', false],
    ['給与計算', 'calculator', '給与計算.dc.html', false],
    ['明細チェック', 'clipboard-check', '明細チェック.dc.html', false],
    ['賞与', 'gift', '賞与.dc.html', false],
    ['年末調整', 'file-text', '年末調整.dc.html', false],
    ['書類', 'folder', '書類.dc.html', true],
    ['設定', 'settings', '設定.dc.html', false],
  ];
  months = ['1月', '2月', '3月', '4月', '5月', '6月'];

  componentDidMount() { this._icons(); }
  componentDidUpdate() { this._icons(); }
  _icons() { if (!window.lucide || !window.lucide.createIcons) { setTimeout(() => this._icons(), 140); return; } try { window.lucide.createIcons(); } catch (e) {} }
  toggleTheme = () => this.setState(s => ({ themeAttr: s.themeAttr === 'dark' ? 'light' : 'dark' }));
  onSelect = (e) => this.setState({ selIndex: +e.target.value });
  onDownload = () => { if (typeof window !== 'undefined' && window.print) window.print(); };
  fmt = (n) => Number(n).toLocaleString('ja-JP');

  renderVals() {
    const navItems = this.nav.map(([label, icon, href, active]) => ({
      label, icon, href,
      style: `display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;text-decoration:none;font-size:14px;cursor:pointer;${active ? 'background:var(--accent-soft);color:var(--accent);font-weight:500' : 'color:var(--text-2);font-weight:400'}`,
    }));
    const HR = (typeof window !== 'undefined' && window.HRData) || { office: {}, employees: [] };
    const C = typeof window !== 'undefined' && window.PayrollCalc;
    const emps = HR.employees || [];
    const empOptions = emps.map((e, i) => ({ value: String(i), label: e.code + ' ' + e.name }));
    const sel = emps[this.state.selIndex] || emps[0] || {};
    const x = C ? C.calc(sel) : {};
    const n = this.months.length;
    const ITEMS = [
      ['基本給', x.base], ['残業手当', x.overtime], ['通勤手当', x.commute], ['総支給', x.gross, true],
      ['健康保険料', x.health], ['介護保険料', x.care], ['子ども・子育て', x.childCare], ['厚生年金保険料', x.pension],
      ['雇用保険料', x.employment], ['所得税', x.incomeTax], ['住民税', x.residentTax], ['控除計', x.deduction, true],
      ['差引支給額', x.net, true],
    ];
    const rows = ITEMS.map(([label, v, bold]) => ({
      label,
      cells: this.months.map(() => this.fmt(v || 0)),
      total: this.fmt((v || 0) * n),
      trStyle: bold ? 'background:var(--surface-sunken)' : '',
    }));

    return {
      themeAttr: this.state.themeAttr,
      themeIcon: this.state.themeAttr === 'dark' ? 'sun' : 'moon',
      toggleTheme: this.toggleTheme,
      navItems, months: this.months, rows, empOptions,
      selIndex: String(this.state.selIndex), onSelect: this.onSelect, onDownload: this.onDownload,
      company: HR.office.name || '吉田国際特許事務所',
      selName: sel.name || '', selCode: sel.code || '',
    };
  }
}
</script>
</body>
</html>
