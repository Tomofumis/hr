<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/fonts.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/colors.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/typography.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/spacing.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/base.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/components.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/styles.css">
<script src="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="app-theme.css">
</helmet>

<div data-theme="{{ themeAttr }}" style="min-height:100vh;background:var(--bg-page);color:var(--text-1);font-family:var(--font-sans);font-size:var(--text-base);line-height:1.5">
<div style="display:flex;min-height:100vh;background:var(--bg-page)">

  <aside class="app-side" style="width:236px;flex:0 0 236px;border-right:1px solid var(--border-hairline);background:var(--surface);display:flex;flex-direction:column;position:sticky;top:0;height:100vh">
    <div style="display:flex;align-items:center;gap:10px;padding:20px 20px 18px">
      <span style="width:30px;height:30px;border-radius:8px;background:var(--accent);display:grid;place-items:center"><i data-lucide="square-stack" width="17" height="17" style="color:var(--accent-on)"></i></span>
      <span style="font-size:17px;font-weight:500;letter-spacing:-0.01em">給与デスク</span>
    </div>
    <nav style="display:flex;flex-direction:column;gap:2px;padding:6px 12px;flex:1;overflow:auto">
      <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="9">
        <a href="{{ item.href }}" class="nav-link" style="{{ item.style }}">
          <i data-lucide="{{ item.icon }}" width="18" height="18" style="flex:0 0 auto"></i>
          <span>{{ item.label }}</span>
        </a>
      </sc-for>
    </nav>
    <div style="padding:14px 16px;border-top:1px solid var(--border-hairline);display:flex;align-items:center;gap:10px">
      <span style="width:30px;height:30px;border-radius:50%;background:var(--surface-sunken);border:1px solid var(--border);display:grid;place-items:center;font-size:12px;color:var(--text-2)">経</span>
      <div style="display:flex;flex-direction:column;line-height:1.3"><span style="font-size:13px">経理 担当</span><span style="font-size:11px;color:var(--text-3)">管理者</span></div>
    </div>
  </aside>

  <div style="flex:1;min-width:0;display:flex;flex-direction:column">

    <header style="position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 28px;border-bottom:1px solid var(--border-hairline);background:color-mix(in srgb,var(--surface) 86%,transparent);backdrop-filter:blur(8px)">
      <div style="display:flex;align-items:center;gap:14px;min-width:0">
        <span style="font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ companyName }}</span>
        <button onClick="{{ cycleMonth }}" style="display:inline-flex;align-items:center;gap:7px;padding:7px 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text-1);font-family:inherit;font-size:13px;cursor:pointer;white-space:nowrap;flex:0 0 auto">
          <i data-lucide="calendar" width="15" height="15" style="color:var(--text-3)"></i>
          <span style="font-variant-numeric:tabular-nums">{{ monthLabel }}</span>
          <i data-lucide="chevron-down" width="14" height="14" style="color:var(--text-3)"></i>
        </button>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <button aria-label="通知" style="position:relative;width:38px;height:38px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--text-2);display:grid;place-items:center;cursor:pointer">
          <i data-lucide="bell" width="19" height="19"></i>
          <span style="position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--accent);border:1.5px solid var(--surface)"></span>
        </button>
        <button onClick="{{ toggleTheme }}" aria-label="表示テーマ" style="width:38px;height:38px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--text-2);display:grid;place-items:center;cursor:pointer">
          <i data-lucide="{{ themeIcon }}" width="19" height="19"></i>
        </button>
      </div>
    </header>

    <main style="flex:1;padding:26px 28px 56px;max-width:1240px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:18px">

      <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap">
        <div style="display:flex;flex-direction:column;gap:3px">
          <h1 style="margin:0;font-size:24px;font-weight:500;letter-spacing:-0.01em">従業員</h1>
          <p style="margin:0;font-size:14px;color:var(--text-3)">従業員情報と給与のベース設定を管理します。</p>
        </div>
        <x-import component-from-global-scope="ToriokiDesignSystem_4ced92.Button" variant="primary" size="md" onClick="{{ onAdd }}" hint-size="auto,40px">＋ 従業員を追加</x-import>
      </div>

      <section style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px"><x-import component-from-global-scope="ToriokiDesignSystem_4ced92.SummaryStat" value="{{ s_total }}" unit="名" label="在籍" hint-size="auto,auto"></x-import></div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px"><x-import component-from-global-scope="ToriokiDesignSystem_4ced92.SummaryStat" value="{{ s_seishain }}" unit="名" label="正社員" hint-size="auto,auto"></x-import></div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px"><x-import component-from-global-scope="ToriokiDesignSystem_4ced92.SummaryStat" value="{{ s_part }}" unit="名" label="契約・パート" hint-size="auto,auto"></x-import></div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px"><x-import component-from-global-scope="ToriokiDesignSystem_4ced92.SummaryStat" value="{{ s_leave }}" unit="名" label="休職中" tone="alert" hint-size="auto,auto"></x-import></div>
      </section>

      <section style="background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 18px;border-bottom:1px solid var(--border-hairline);flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <sc-for list="{{ filters }}" as="f" hint-placeholder-count="4">
              <button onClick="{{ f.onClick }}" style="{{ f.style }}">{{ f.label }}<span style="{{ f.countStyle }}">{{ f.count }}</span></button>
            </sc-for>
          </div>
          <div style="position:relative;display:flex;align-items:center">
            <i data-lucide="search" width="16" height="16" style="position:absolute;left:11px;color:var(--text-4)"></i>
            <input value="{{ query }}" onInput="{{ onSearch }}" placeholder="氏名で検索" style="width:200px;max-width:48vw;padding:8px 12px 8px 32px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text-1);font-family:inherit;font-size:13px;outline:none">
          </div>
        </div>

        <div style="overflow-x:auto">
          <div style="min-width:680px">
            <div style="display:grid;grid-template-columns:1.8fr 1fr 1fr 1.1fr 1fr 0.9fr;gap:10px;padding:11px 18px;border-bottom:1px solid var(--border-hairline);font-size:12px;color:var(--text-3)">
              <span>氏名</span><span>部署</span><span>雇用区分</span><span>入社日</span><span style="text-align:right">月給（基本）</span><span>ステータス</span>
            </div>
            <sc-if value="{{ hasRows }}" hint-placeholder-val="{{ true }}">
              <div>
                <sc-for list="{{ rows }}" as="r" hint-placeholder-count="8">
                  <a href="従業員詳細.dc.html" class="row-hover" style="display:grid;grid-template-columns:1.8fr 1fr 1fr 1.1fr 1fr 0.9fr;gap:10px;align-items:center;padding:13px 18px;border-bottom:1px solid var(--border-hairline);cursor:pointer;text-decoration:none;color:inherit">
                    <div style="display:flex;align-items:center;gap:11px;min-width:0">
                      <span style="width:32px;height:32px;border-radius:50%;background:var(--surface-sunken);border:1px solid var(--border);display:grid;place-items:center;font-size:13px;color:var(--text-2);flex:0 0 auto">{{ r.initial }}</span>
                      <div style="display:flex;flex-direction:column;min-width:0">
                        <span style="font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ r.name }}</span>
                        <span style="font-size:11px;color:var(--text-4);font-family:var(--font-mono)">{{ r.code }}</span>
                      </div>
                    </div>
                    <span style="font-size:13px;color:var(--text-2)">{{ r.dept }}</span>
                    <span style="{{ r.kubunStyle }}">{{ r.kubun }}</span>
                    <span style="font-size:13px;color:var(--text-2);font-family:var(--font-mono);font-variant-numeric:tabular-nums">{{ r.joined }}</span>
                    <span style="text-align:right;font-size:13px;font-family:var(--font-mono);font-variant-numeric:tabular-nums">{{ r.salary }}</span>
                    <span style="{{ r.statusStyle }}">{{ r.status }}</span>
                  </a>
                </sc-for>
              </div>
            </sc-if>
            <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ false }}">
              <div style="padding:48px 20px;text-align:center;color:var(--text-3);font-size:14px">該当する従業員がいません。</div>
            </sc-if>
          </div>
        </div>
      </section>

    </main>
  </div>
</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 860 },
  &quot;companyName&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;株式会社 山田製作所&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;事業所&quot; }
}">
class Component extends DCLogic {
  state = { themeAttr: '', monthIndex: 1, filter: 'all', query: '' };
  months = ['2026年5月度', '2026年6月度', '2026年7月度'];

  nav = [
    ['ダッシュボード', 'layout-dashboard', '給与ダッシュボード.dc.html', false],
    ['従業員', 'users', '従業員.dc.html', true],
    ['勤怠', 'clock', '勤怠.dc.html', false],
    ['休暇・有給', 'palmtree', '休暇・有給.dc.html', false],
    ['給与計算', 'calculator', '#', false],
    ['明細チェック', 'clipboard-check', '明細チェック.dc.html', false],
    ['賞与', 'gift', '#', false],
    ['年末調整', 'file-text', '年末調整.dc.html', false],
    ['書類', 'folder', '#', false],
    ['設定', 'settings', '#', false],
  ];

  employees = [
    { name: '山田太郎', code: 'E-1001', dept: '営業部', kubun: '正社員', joined: '2018/04/01', salary: 280000, status: '在籍' },
    { name: '佐藤花子', code: 'E-1002', dept: '製造部', kubun: '正社員', joined: '2019/07/16', salary: 255000, status: '在籍' },
    { name: '鈴木一郎', code: 'E-1003', dept: '開発部', kubun: '正社員', joined: '2016/04/01', salary: 360000, status: '在籍' },
    { name: '田中美咲', code: 'E-1004', dept: '管理部', kubun: '契約', joined: '2021/10/01', salary: 220000, status: '在籍' },
    { name: '高橋健太', code: 'E-1005', dept: '営業部', kubun: '正社員', joined: '2020/04/01', salary: 262000, status: '在籍' },
    { name: '渡辺さくら', code: 'E-1006', dept: '製造部', kubun: 'パート', joined: '2022/06/01', salary: 168000, status: '在籍' },
    { name: '伊藤大輔', code: 'E-1007', dept: '開発部', kubun: '正社員', joined: '2017/09/01', salary: 345000, status: '在籍' },
    { name: '山本由美', code: 'E-1008', dept: '管理部', kubun: '正社員', joined: '2015/04/01', salary: 298000, status: '休職' },
    { name: '中村翔', code: 'E-1009', dept: '営業部', kubun: '契約', joined: '2023/01/16', salary: 240000, status: '在籍' },
    { name: '小林麻衣', code: 'E-1010', dept: '製造部', kubun: 'パート', joined: '2021/03/01', salary: 152000, status: '在籍' },
    { name: '加藤遼', code: 'E-1011', dept: '開発部', kubun: '正社員', joined: '2019/11/01', salary: 312000, status: '在籍' },
    { name: '吉田直樹', code: 'E-1012', dept: '営業部', kubun: '正社員', joined: '2014/04/01', salary: 330000, status: '在籍' },
  ];

  componentDidMount() { this._icons(); }
  componentDidUpdate() { this._icons(); }
  _icons() { if (!window.lucide || !window.lucide.createIcons) { setTimeout(() => this._icons(), 140); return; } try { window.lucide.createIcons(); } catch (e) {} }

  toggleTheme = () => this.setState(s => ({ themeAttr: s.themeAttr === 'dark' ? 'light' : 'dark' }));
  cycleMonth = () => this.setState(s => ({ monthIndex: (s.monthIndex + 1) % this.months.length }));
  setFilter = (k) => this.setState({ filter: k });
  onSearch = (e) => this.setState({ query: e.target.value });

  _kubunStyle(k) {
    const base = 'display:inline-flex;align-items:center;justify-self:start;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:500;';
    if (k === '正社員') return base + 'background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent-soft-border)';
    return base + 'background:var(--surface-sunken);color:var(--text-2);border:1px solid var(--border)';
  }
  _statusStyle(s) {
    const base = 'display:inline-flex;align-items:center;gap:5px;justify-self:start;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:500;';
    if (s === '休職') return base + 'background:var(--sev-warn-bg);color:var(--sev-warn-fg);border:1px solid var(--sev-warn-border)';
    return base + 'background:var(--ok-bg);color:var(--ok-fg);border:1px solid var(--ok-border)';
  }

  _isPart(k) { return k === '契約' || k === 'パート'; }

  renderVals() {
    const p = this.props || {};
    const navItems = this.nav.map(([label, icon, href, active]) => ({
      label, icon, href,
      style: `display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;text-decoration:none;font-size:14px;cursor:pointer;${active ? 'background:var(--accent-soft);color:var(--accent);font-weight:500' : 'color:var(--text-2);font-weight:400'}`,
    }));

    const total = this.employees.length;
    const seishain = this.employees.filter(e => e.kubun === '正社員').length;
    const part = this.employees.filter(e => this._isPart(e.kubun)).length;
    const leave = this.employees.filter(e => e.status === '休職').length;

    const counts = { all: total, seishain, part, leave };
    const filterDefs = [['all', 'すべて'], ['seishain', '正社員'], ['part', '契約・パート'], ['leave', '休職中']];
    const filters = filterDefs.map(([key, label]) => {
      const active = this.state.filter === key;
      return {
        label, count: counts[key],
        onClick: () => this.setFilter(key),
        style: `display:inline-flex;align-items:center;gap:7px;padding:7px 12px;border-radius:10px;font-family:inherit;font-size:13px;cursor:pointer;border:1px solid ${active ? 'var(--accent-soft-border)' : 'transparent'};background:${active ? 'var(--accent-soft)' : 'transparent'};color:${active ? 'var(--accent)' : 'var(--text-2)'};font-weight:${active ? 500 : 400}`,
        countStyle: `font-size:11px;font-family:var(--font-mono);font-variant-numeric:tabular-nums;color:${active ? 'var(--accent)' : 'var(--text-4)'}`,
      };
    });

    const q = (this.state.query || '').trim();
    const filtered = this.employees.filter(e => {
      const f = this.state.filter;
      if (f === 'seishain' && e.kubun !== '正社員') return false;
      if (f === 'part' && !this._isPart(e.kubun)) return false;
      if (f === 'leave' && e.status !== '休職') return false;
      if (q && !e.name.includes(q)) return false;
      return true;
    });

    const rows = filtered.map(e => ({
      name: e.name, code: e.code, dept: e.dept, kubun: e.kubun, joined: e.joined,
      initial: e.name.charAt(0),
      salary: '¥' + e.salary.toLocaleString('ja-JP'),
      kubunStyle: this._kubunStyle(e.kubun),
      status: e.status,
      statusStyle: this._statusStyle(e.status),
    }));

    return {
      themeAttr: this.state.themeAttr,
      themeIcon: this.state.themeAttr === 'dark' ? 'sun' : 'moon',
      toggleTheme: this.toggleTheme,
      companyName: p.companyName ?? '株式会社 山田製作所',
      monthLabel: this.months[this.state.monthIndex],
      cycleMonth: this.cycleMonth,
      navItems,
      onAdd: () => {},
      s_total: total, s_seishain: seishain, s_part: part, s_leave: leave,
      filters,
      query: this.state.query,
      onSearch: this.onSearch,
      rows,
      hasRows: rows.length > 0,
      isEmpty: rows.length === 0,
    };
  }
}
</script>
</body>
</html>
