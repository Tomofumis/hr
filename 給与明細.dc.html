<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/fonts.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/colors.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/typography.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/spacing.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/base.css">
<link rel="stylesheet" href="app-theme.css">
<style>
  @media print {
    .noprint { display:none !important; }
    body, .pay-root { background:#fff !important; }
    .pay-sheet { box-shadow:none !important; margin:0 !important; }
  }
  @page { size: A4; margin: 12mm; }
</style>
</helmet>

<div data-theme="{{ themeAttr }}" class="pay-root" style="min-height:100vh;background:var(--surface-sunken);font-family:var(--font-sans);color:var(--text-1);display:flex;flex-direction:column;align-items:center;padding:24px 16px 60px">

  <div class="noprint" style="width:100%;max-width:900px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap">
    <div style="display:flex;flex-direction:column;gap:2px">
      <span style="font-size:13px;color:var(--text-3)">給与明細 ・ 2026年6月支払分</span>
      <span style="font-size:12px;color:var(--text-4)">PDF出力すると、この体裁のまま保存できます。</span>
    </div>
    <button onClick="{{ onPrint }}" style="display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:10px;border:none;background:var(--accent);color:var(--accent-on);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer">{{ dlEl }}PDFをダウンロード</button>
  </div>

  <div class="pay-sheet" style="width:100%;max-width:900px;background:#ffffff;color:#1a1815;border:1px solid var(--border-strong);border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.06);padding:28px 30px 30px;display:flex;flex-direction:column;gap:14px">

    <div style="display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap">
      <div style="display:flex;align-items:baseline;gap:14px;flex-wrap:wrap">
        <span style="font-size:21px;font-weight:500">給与明細 <span style="font-weight:400">(山田 太郎)</span></span>
        <span style="font-size:12px;color:#615d55;line-height:1.5">2026年6月支払分<br>株式会社 山田製作所</span>
      </div>
      <span style="font-size:12px;color:#615d55">（単位：円）</span>
    </div>

    <div style="border:1px solid #ccc8c0;border-radius:8px;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">
      <div style="display:flex;flex-direction:column;gap:2px">
        <span style="font-size:30px;font-weight:500;letter-spacing:0.01em;white-space:nowrap">山田 太郎</span>
        <span style="font-size:12px;color:#615d55;font-family:var(--font-mono)">(E-1001)</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
        <span style="font-size:13px;color:#615d55">差引総支給額</span>
        <span style="font-size:34px;font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:0.01em">332,536</span>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div style="border:1px solid #ccc8c0;border-radius:8px;overflow:hidden">
        <div style="padding:9px;text-align:center;font-size:15px;font-weight:500;background:#f1efeb;border-bottom:1px solid #ccc8c0">支給</div>
        <div style="padding:14px 18px;display:flex;flex-direction:column">
          <sc-for list="{{ shikyu }}" as="r" hint-placeholder-count="3">
            <div style="display:flex;justify-content:space-between;gap:12px;padding:7px 0;font-size:14px"><span style="color:#3a362f">{{ r.0 }}</span><span style="font-family:var(--font-mono);font-variant-numeric:tabular-nums">{{ r.1 }}</span></div>
          </sc-for>
          <div style="display:flex;justify-content:space-between;gap:12px;padding:9px 0 2px;margin-top:4px;border-top:1px solid #e1dfd9;font-size:14px;font-weight:500"><span>計</span><span style="font-family:var(--font-mono);font-variant-numeric:tabular-nums">477,634</span></div>
        </div>
      </div>
      <div style="border:1px solid #ccc8c0;border-radius:8px;overflow:hidden">
        <div style="padding:9px;text-align:center;font-size:15px;font-weight:500;background:#f1efeb;border-bottom:1px solid #ccc8c0">控除</div>
        <div style="padding:14px 18px;display:flex;flex-direction:column">
          <sc-for list="{{ kojo }}" as="r" hint-placeholder-count="7">
            <div style="display:flex;justify-content:space-between;gap:12px;padding:7px 0;font-size:14px"><span style="color:#3a362f">{{ r.0 }}</span><span style="font-family:var(--font-mono);font-variant-numeric:tabular-nums">{{ r.1 }}</span></div>
          </sc-for>
          <div style="display:flex;justify-content:space-between;gap:12px;padding:9px 0 2px;margin-top:4px;border-top:1px solid #e1dfd9;font-size:14px;font-weight:500"><span>計</span><span style="font-family:var(--font-mono);font-variant-numeric:tabular-nums">145,098</span></div>
        </div>
      </div>
    </div>

    <div style="border:1px solid #ccc8c0;border-radius:8px;overflow:hidden">
      <div style="padding:9px;text-align:center;font-size:15px;font-weight:500;background:#f1efeb;border-bottom:1px solid #ccc8c0">勤怠（2026年5月16日 〜 2026年6月15日 勤務分）</div>
      <div style="padding:14px 18px;display:flex;flex-direction:column">
        <sc-for list="{{ kintai }}" as="r" hint-placeholder-count="5">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:7px 0;font-size:14px">
            <div style="display:flex;justify-content:space-between;gap:12px"><span style="color:#3a362f">{{ r.0 }}</span><span style="font-family:var(--font-mono);font-variant-numeric:tabular-nums">{{ r.1 }}</span></div>
            <div style="display:flex;justify-content:space-between;gap:12px"><span style="color:#3a362f">{{ r.2 }}</span><span style="font-family:var(--font-mono);font-variant-numeric:tabular-nums">{{ r.3 }}</span></div>
          </div>
        </sc-for>
      </div>
    </div>

    <div style="border:1px solid #ccc8c0;border-radius:8px;overflow:hidden">
      <div style="padding:9px;text-align:center;font-size:15px;font-weight:500;background:#f1efeb;border-bottom:1px solid #ccc8c0">備考</div>
      <div style="padding:13px 18px;font-size:14px;color:#3a362f">課税支給累計額（2026年1月〜6月）　<span style="font-family:var(--font-mono);font-variant-numeric:tabular-nums">2,818,546</span></div>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 940, &quot;height&quot;: 1000 } }">
class Component extends DCLogic {
  state = { themeAttr: 'light' };
  onPrint = () => { try { window.print(); } catch (e) {} };
  renderVals() {
    return {
      themeAttr: 'light',
      onPrint: this.onPrint,
      dlEl: React.createElement('svg', { width: 17, height: 17, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' },
        [['path', { d: 'M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4' }], ['polyline', { points: '7 10 12 15 17 10' }], ['line', { x1: 12, x2: 12, y1: 15, y2: 3 }]].map((d, i) => React.createElement(d[0], { key: i, ...d[1] }))),
      shikyu: [['基本給', '360,000'], ['残業手当', '117,634'], ['勤怠控除', '0']],
      kojo: [['健康保険料', '26,103'], ['介護保険料', '4,293'], ['子ども・子育て支援金', '609'], ['厚生年金保険料', '48,495'], ['雇用保険料', '2,388'], ['所得税', '15,410'], ['住民税', '47,800']],
      kintai: [
        ['労働日数', '21.0 日', '欠勤日数', '0.0 日 / 0'],
        ['有休取得日数', '1.0 日', '有休残日数', '29.0 日'],
        ['法定内残業時間', '21:35 / 52,858', '法定休日労働時間', '00:00 / 0'],
        ['時間外労働時間', '20:42 / 63,368', '深夜労働時間', '02:18 / 1,408'],
        ['遅刻早退時間', '00:00 / 0', '時間外労働時間 60時間超過分', '00:00 / 0'],
      ],
    };
  }
}
</script>
</body>
</html>
