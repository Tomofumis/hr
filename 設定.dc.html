<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/fonts.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/colors.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/typography.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/tokens/spacing.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/base.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/components.css">
<link rel="stylesheet" href="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/styles.css">
<script src="_ds/torioki-design-system-4ced921d-d027-4ce0-a389-3c2bafa05800/_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="app-theme.css">
</helmet>

<div data-theme="{{ themeAttr }}" style="min-height:100vh;background:var(--bg-page);color:var(--text-1);font-family:var(--font-sans);font-size:var(--text-base);line-height:1.5">
<div style="display:flex;min-height:100vh;background:var(--bg-page)">

  <aside class="app-side" style="width:236px;flex:0 0 236px;border-right:1px solid var(--border-hairline);background:var(--surface);display:flex;flex-direction:column;position:sticky;top:0;height:100vh">
    <div style="display:flex;align-items:center;gap:10px;padding:20px 20px 18px">
      <span style="width:30px;height:30px;border-radius:8px;background:var(--accent);display:grid;place-items:center"><i data-lucide="square-stack" width="17" height="17" style="color:var(--accent-on)"></i></span>
      <span style="font-size:17px;font-weight:500;letter-spacing:-0.01em">給与デスク</span>
    </div>
    <nav style="display:flex;flex-direction:column;gap:2px;padding:6px 12px;flex:1;overflow:auto">
      <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="9">
        <a href="{{ item.href }}" class="nav-link" style="{{ item.style }}">
          <i data-lucide="{{ item.icon }}" width="18" height="18" style="flex:0 0 auto"></i>
          <span>{{ item.label }}</span>
        </a>
      </sc-for>
    </nav>
    <div style="padding:14px 16px;border-top:1px solid var(--border-hairline);display:flex;align-items:center;gap:10px">
      <span style="width:30px;height:30px;border-radius:50%;background:var(--surface-sunken);border:1px solid var(--border);display:grid;place-items:center;font-size:12px;color:var(--text-2)">経</span>
      <div style="display:flex;flex-direction:column;line-height:1.3"><span style="font-size:13px">経理 担当</span><span style="font-size:11px;color:var(--text-3)">管理者</span></div>
    </div>
  </aside>

  <div style="flex:1;min-width:0;display:flex;flex-direction:column">

    <header style="position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 28px;border-bottom:1px solid var(--border-hairline);background:color-mix(in srgb,var(--surface) 86%,transparent);backdrop-filter:blur(8px)">
      <div style="display:flex;align-items:center;gap:14px;min-width:0">
        <span style="font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ companyName }}</span>
        <button onClick="{{ cycleMonth }}" style="display:inline-flex;align-items:center;gap:7px;padding:7px 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text-1);font-family:inherit;font-size:13px;cursor:pointer;white-space:nowrap;flex:0 0 auto">
          <i data-lucide="calendar" width="15" height="15" style="color:var(--text-3)"></i>
          <span style="font-variant-numeric:tabular-nums">{{ monthLabel }}</span>
          <i data-lucide="chevron-down" width="14" height="14" style="color:var(--text-3)"></i>
        </button>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <button aria-label="通知" style="position:relative;width:38px;height:38px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--text-2);display:grid;place-items:center;cursor:pointer">
          <i data-lucide="bell" width="19" height="19"></i>
          <span style="position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--accent);border:1.5px solid var(--surface)"></span>
        </button>
        <button onClick="{{ toggleTheme }}" aria-label="表示テーマ" style="width:38px;height:38px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--text-2);display:grid;place-items:center;cursor:pointer">
          <i data-lucide="{{ themeIcon }}" width="19" height="19"></i>
        </button>
      </div>
    </header>

    <main style="flex:1;padding:26px 28px 0;max-width:880px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:18px">

      <div style="display:flex;flex-direction:column;gap:3px">
        <h1 style="margin:0;font-size:24px;font-weight:500;letter-spacing:-0.01em">設定</h1>
        <p style="margin:0;font-size:14px;color:var(--text-3)">事業所情報や給与計算の基本ルールを設定します。</p>
      </div>

      <section style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;display:flex;flex-direction:column;gap:18px">
        <div style="display:flex;align-items:center;gap:11px">
          <span style="width:34px;height:34px;border-radius:9px;background:var(--accent-soft);display:grid;place-items:center;flex:0 0 auto"><i data-lucide="building-2" width="17" height="17" style="color:var(--accent)"></i></span>
          <div style="display:flex;flex-direction:column"><span style="font-size:15px;font-weight:500">事業所情報</span><span style="font-size:12px;color:var(--text-3)">明細・帳票に表示される基本情報</span></div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px">
          <x-import component-from-global-scope="ToriokiDesignSystem_4ced92.Input" label="事業所名" value="{{ f_company }}" onChange="{{ on_company }}" hint-size="100%,auto"></x-import>
          <x-import component-from-global-scope="ToriokiDesignSystem_4ced92.Input" label="法人番号" value="{{ f_corp }}" onChange="{{ on_corp }}" hint-size="100%,auto"></x-import>
          <x-import component-from-global-scope="ToriokiDesignSystem_4ced92.Input" label="代表者名" value="{{ f_rep }}" onChange="{{ on_rep }}" hint-size="100%,auto"></x-import>
          <x-import component-from-global-scope="ToriokiDesignSystem_4ced92.Input" label="所在地" value="{{ f_addr }}" onChange="{{ on_addr }}" hint-size="100%,auto"></x-import>
        </div>
      </section>

      <section style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;display:flex;flex-direction:column;gap:18px">
        <div style="display:flex;align-items:center;gap:11px">
          <span style="width:34px;height:34px;border-radius:9px;background:var(--accent-soft);display:grid;place-items:center;flex:0 0 auto"><i data-lucide="calendar-clock" width="17" height="17" style="color:var(--accent)"></i></span>
          <div style="display:flex;flex-direction:column"><span style="font-size:15px;font-weight:500">締め・支払</span><span style="font-size:12px;color:var(--text-3)">給与計算の対象期間と支払条件</span></div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px">
          <x-import component-from-global-scope="ToriokiDesignSystem_4ced92.Select" label="締め日" value="{{ f_closing }}" options="{{ opt_closing }}" onChange="{{ on_closing }}" hint-size="100%,auto"></x-import>
          <x-import component-from-global-scope="ToriokiDesignSystem_4ced92.Select" label="支払日" value="{{ f_pay }}" options="{{ opt_pay }}" onChange="{{ on_pay }}" hint-size="100%,auto"></x-import>
          <x-import component-from-global-scope="ToriokiDesignSystem_4ced92.Select" label="支払方法" value="{{ f_method }}" options="{{ opt_method }}" onChange="{{ on_method }}" hint-size="100%,auto"></x-import>
        </div>
      </section>

      <section style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;display:flex;flex-direction:column;gap:18px">
        <div style="display:flex;align-items:center;gap:11px">
          <span style="width:34px;height:34px;border-radius:9px;background:var(--accent-soft);display:grid;place-items:center;flex:0 0 auto"><i data-lucide="percent" width="17" height="17" style="color:var(--accent)"></i></span>
          <div style="display:flex;flex-direction:column"><span style="font-size:15px;font-weight:500">社会保険・税</span><span style="font-size:12px;color:var(--text-3)">控除計算に使用する料率</span></div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px">
          <x-import component-from-global-scope="ToriokiDesignSystem_4ced92.Input" label="健康保険料率（%）" value="{{ f_health }}" onChange="{{ on_health }}" hint-size="100%,auto"></x-import>
          <x-import component-from-global-scope="ToriokiDesignSystem_4ced92.Input" label="厚生年金保険料率（%）" value="{{ f_pension }}" onChange="{{ on_pension }}" hint-size="100%,auto"></x-import>
          <x-import component-from-global-scope="ToriokiDesignSystem_4ced92.Input" label="雇用保険料率（%）" value="{{ f_emp }}" onChange="{{ on_emp }}" hint-size="100%,auto"></x-import>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;padding-top:4px;border-top:1px solid var(--border-hairline);margin-top:2px;padding-top:16px">
          <div style="display:flex;flex-direction:column;gap:1px"><span style="font-size:14px;font-weight:500">住民税の特別徴収</span><span style="font-size:13px;color:var(--text-2)">毎月の給与から住民税を控除します</span></div>
          <x-import component-from-global-scope="ToriokiDesignSystem_4ced92.Toggle" checked="{{ f_resident }}" onChange="{{ on_resident }}" aria-label="住民税の特別徴収" hint-size="auto,auto"></x-import>
        </div>
      </section>

      <section style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;align-items:center;gap:11px;margin-bottom:8px">
          <span style="width:34px;height:34px;border-radius:9px;background:var(--accent-soft);display:grid;place-items:center;flex:0 0 auto"><i data-lucide="bell" width="17" height="17" style="color:var(--accent)"></i></span>
          <div style="display:flex;flex-direction:column"><span style="font-size:15px;font-weight:500">通知</span><span style="font-size:12px;color:var(--text-3)">担当者へのお知らせ</span></div>
        </div>
        <sc-for list="{{ notifs }}" as="n" hint-placeholder-count="3">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 0;border-bottom:1px solid var(--border-hairline)">
            <div style="display:flex;flex-direction:column;gap:1px"><span style="font-size:14px;font-weight:500">{{ n.title }}</span><span style="font-size:13px;color:var(--text-2)">{{ n.desc }}</span></div>
            <x-import component-from-global-scope="ToriokiDesignSystem_4ced92.Toggle" checked="{{ n.checked }}" onChange="{{ n.onChange }}" aria-label="{{ n.title }}" hint-size="auto,auto"></x-import>
          </div>
        </sc-for>
      </section>

      <div style="position:sticky;bottom:0;z-index:4;margin:0 -28px;padding:14px 28px;background:color-mix(in srgb,var(--surface) 90%,transparent);backdrop-filter:blur(8px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:12px">
        <sc-if value="{{ dirty }}" hint-placeholder-val="{{ false }}">
          <span style="margin-right:auto;display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--sev-warn-fg)"><i data-lucide="circle-dot" width="14" height="14"></i>未保存の変更があります</span>
        </sc-if>
        <sc-if value="{{ clean }}" hint-placeholder-val="{{ true }}">
          <span style="margin-right:auto;display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--text-3)"><i data-lucide="check" width="14" height="14"></i>保存済み</span>
        </sc-if>
        <x-import component-from-global-scope="ToriokiDesignSystem_4ced92.Button" variant="ghost" size="md" onClick="{{ onCancel }}" hint-size="auto,40px">変更を破棄</x-import>
        <x-import component-from-global-scope="ToriokiDesignSystem_4ced92.Button" variant="primary" size="md" onClick="{{ onSave }}" hint-size="auto,40px">変更を保存</x-import>
      </div>

    </main>
  </div>
</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1180, &quot;height&quot;: 900 }
}">
class Component extends DCLogic {
  defaults = {
    company: '株式会社 山田製作所', corp: '1234567890123', rep: '山田 一郎', addr: '東京都品川区西五反田 1-2-3',
    closing: '15日', pay: '当月25日', method: '銀行振込',
    health: '9.98', pension: '18.30', emp: '0.60', resident: true,
    notifyAnomaly: true, notifyApproval: true, notifyMonthly: false,
  };

  state = { themeAttr: '', monthIndex: 1, form: { ...this.defaults }, saved: { ...this.defaults } };
  months = ['2026年5月度', '2026年6月度', '2026年7月度'];

  nav = [
    ['ダッシュボード', 'layout-dashboard', '給与ダッシュボード.dc.html', false],
    ['従業員', 'users', '従業員.dc.html', false],
    ['勤怠', 'clock', '勤怠.dc.html', false],
    ['休暇・有給', 'palmtree', '休暇・有給.dc.html', false],
    ['給与計算', 'calculator', '給与計算.dc.html', false],
    ['明細チェック', 'clipboard-check', '明細チェック.dc.html', false],
    ['賞与', 'gift', '賞与.dc.html', false],
    ['年末調整', 'file-text', '年末調整.dc.html', false],
    ['書類', 'folder', '書類.dc.html', false],
    ['設定', 'settings', '設定.dc.html', true],
  ];

  componentDidMount() { this._icons(); }
  componentDidUpdate() { this._icons(); }
  _icons() { if (!window.lucide || !window.lucide.createIcons) { setTimeout(() => this._icons(), 140); return; } try { window.lucide.createIcons(); } catch (e) {} }

  toggleTheme = () => this.setState(s => ({ themeAttr: s.themeAttr === 'dark' ? 'light' : 'dark' }));
  cycleMonth = () => this.setState(s => ({ monthIndex: (s.monthIndex + 1) % this.months.length }));
  setField = (k, v) => this.setState(s => ({ form: { ...s.form, [k]: v } }));
  onSave = () => this.setState(s => ({ saved: { ...s.form } }));
  onCancel = () => this.setState(s => ({ form: { ...s.saved } }));

  renderVals() {
    const p = this.props || {};
    const navItems = this.nav.map(([label, icon, href, active]) => ({
      label, icon, href,
      style: `display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;text-decoration:none;font-size:14px;cursor:pointer;${active ? 'background:var(--accent-soft);color:var(--accent);font-weight:500' : 'color:var(--text-2);font-weight:400'}`,
    }));

    const f = this.state.form;
    const ev = (k) => (e) => this.setField(k, e.target.value);
    const bv = (k) => (v) => this.setField(k, v);
    const dirty = JSON.stringify(this.state.form) !== JSON.stringify(this.state.saved);

    const notifs = [
      { key: 'notifyAnomaly', title: '勤怠異常の通知', desc: '勤怠の取込時に異常があれば知らせます' },
      { key: 'notifyApproval', title: '承認依頼の通知', desc: '休暇申請などの承認待ちを知らせます' },
      { key: 'notifyMonthly', title: '月次レポート', desc: '毎月の給与サマリをメールで受け取ります' },
    ].map(n => ({ ...n, checked: f[n.key], onChange: bv(n.key) }));

    return {
      themeAttr: this.state.themeAttr,
      themeIcon: this.state.themeAttr === 'dark' ? 'sun' : 'moon',
      toggleTheme: this.toggleTheme,
      companyName: p.companyName ?? f.company,
      monthLabel: this.months[this.state.monthIndex],
      cycleMonth: this.cycleMonth,
      navItems,

      f_company: f.company, on_company: ev('company'),
      f_corp: f.corp, on_corp: ev('corp'),
      f_rep: f.rep, on_rep: ev('rep'),
      f_addr: f.addr, on_addr: ev('addr'),
      f_closing: f.closing, on_closing: ev('closing'), opt_closing: ['15日', '20日', '末日'],
      f_pay: f.pay, on_pay: ev('pay'), opt_pay: ['当月25日', '翌月10日', '翌月25日'],
      f_method: f.method, on_method: ev('method'), opt_method: ['銀行振込', '現金支給'],
      f_health: f.health, on_health: ev('health'),
      f_pension: f.pension, on_pension: ev('pension'),
      f_emp: f.emp, on_emp: ev('emp'),
      f_resident: f.resident, on_resident: bv('resident'),
      notifs,

      dirty, clean: !dirty,
      onSave: this.onSave, onCancel: this.onCancel,
    };
  }
}
</script>
</body>
</html>
